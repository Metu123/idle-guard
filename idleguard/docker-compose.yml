version: '3.8'
services:
  db:
    image: mysql:5.7
    container_name: idleguard_db
    environment:
      MYSQL_DATABASE: wp_db
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - idleguard_net

  wordpress:
    image: wordpress:6.4-php8.1-apache
    container_name: idleguard_wp
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp_pass
      WORDPRESS_DB_NAME: wp_db
    volumes:
      - ./plugins:/var/www/html/wp-content/plugins
    networks:
      - idleguard_net

volumes:
  db_data:

networks:
  idleguard_net:
    driver: bridge
